<div class="entry">
    <div class="entry-header">
        <div class="entry-heading">
            <div class="role">{{ edu.title }}</div>
            <div class="org">{{ edu.org }}</div>

        <div class="date">{{ edu.date }}</div>
    </div>
    {% if edu.note %}<p class="entry-note">{{ edu.note }}</p>{% endif %}
</div>
